name: Deploy Pair Application

on:
  push:
    branches:
      - feature/job-diva-sync
      - develop

jobs:

  # ----------------------
  # QA DEPLOYMENT
  # ----------------------
  deploy-qa:
    if: github.ref_name == 'feature/job-diva-sync'
    runs-on: ubuntu-latest

    environment:
      name: qa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_JOB_DIVA_KEY_QA }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.AZURE_JOB_DIVA_HOST_QA }} >> ~/.ssh/known_hosts

      - name: Deploy to QA VM
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@${{ secrets.AZURE_JOB_DIVA_HOST_QA }} << 'EOF'
            set -e
            cd ~/codebase/airecruiter
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}
            bash deploy-azure.sh
          EOF

      - name: Deployment Info
        run: |
          echo "🚀 QA Deployment Complete"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"



  # ----------------------
  # PRODUCTION DEPLOYMENT
  # ----------------------
  deploy-prod:
    if: github.ref_name == 'develop'
    #if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_JOB_DIVA_KEY_PROD }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.AZURE_JOB_DIVA_HOST_PROD }} >> ~/.ssh/known_hosts

      - name: Deploy to PROD VM
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@${{ secrets.AZURE_JOB_DIVA_HOST_PROD }} << 'EOF'
            set -e
            cd ~/codebase/airecruiter
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}
            bash deploy-azure.sh
          EOF

      - name: Deployment Info
        run: |
          echo "🚀 PRODUCTION Deployment Complete"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"