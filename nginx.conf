# AI Recruiter Nginx Configuration Template
# Copy this file to /etc/nginx/sites-available/airecruiter
# 
# Template placeholders:
# {{DOMAIN_NAME}} - Will be replaced with actual domain during deployment
#                   (qacurate.hoonr.ai for QA, curate.hoonr.ai for PROD)

# Upstream configuration for backend API
upstream airecruiter_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Upstream configuration for frontend web
upstream airecruiter_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate limiting zones.
# Prior values (api=30r/m, web=60r/m) were sized for a server-rendered app with
# one request per navigation. Next.js 16 App Router aggressively prefetches RSC
# payloads (`?_rsc=<nonce>`) on link hover/visibility — a dashboard with many
# <Link> tags routinely fires 20+ RSC requests in the first second, blowing
# past the 60r/m + burst=20 cap and returning 503 to the browser. Bump the web
# zone 10x to absorb prefetch bursts; keep api_limit tight (still user-driven
# traffic, no prefetch amplification).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=600r/m;

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name {{DOMAIN_NAME}};
    return 301 https://$server_name$request_uri;
}

# Main server block (HTTPS)
server {
    listen 443 ssl http2;
    server_name {{DOMAIN_NAME}};
    
    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/{{DOMAIN_NAME}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN_NAME}}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # API routes with /api/ prefix (includes v1, v2, etc.)
    # NOTE: proxy_pass intentionally WITHOUT trailing slash. With a trailing
    # slash (`http://airecruiter_api/;`) nginx strips the matched `/api/`
    # location prefix before forwarding, so a request to
    # `/api/v1/ai-generation/jobs/.../generate-description` arrives at the
    # backend as `/v1/ai-generation/...` — which doesn't match the FastAPI
    # routers registered with `prefix="/api/v1/ai-generation"` etc., and
    # FastAPI returns a generic `{"detail":"Not Found"}` 404 for every call.
    # No trailing slash = URI passed through unchanged, so `/api/v1/*` routes
    # resolve correctly against the backend mounts.
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://airecruiter_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # ========== BACKEND API ENDPOINTS (NON-/api/ PREFIX) ==========
    
    # Core Job Management APIs
    location /jobs/parse {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    location /jobs/fetch {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    location /jobs/create {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    location /jobs/monitored {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    location /jobs/poll-now {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # Chat AI endpoint
    location /chat {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Job ID-specific endpoints (comprehensive coverage)
    location ~ ^/jobs/([^/]+)/(monitored-data|save|draft|save-step|monitor|publish|sync|extract-skills|skills|basic-info|candidates|archive|bulk-resumes|manual-candidate|requirements)(/.*)?$ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # /candidates/<sub-path> → API backend (list, filter-options, search, save,
    # message, analyze, enhanced-fetch, {id}/resume, {id}/phone, {id}/update-resume,
    # search/legacy). Regex requires ≥1 char after the slash, so bare /candidates/
    # (incl. Next.js RSC prefetch /candidates/?_rsc=<nonce>) falls through to the
    # `location /` catch-all and hits Next.js — fixing the v23 regression where
    # a plain `location /candidates/` prefix also matched the bare page URL and
    # RSC prefetches on <Link href="/candidates"> hit the API backend → 404.
    location ~ ^/candidates/.+ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # Frontend Dashboard & UI routes that should go to Next.js:
    # / → Main Dashboard 
    # /jobs → Monitored Jobs Dashboard (conflicts with API /jobs/monitored, but different paths)
    # /jobs/new → Job Creation Wizard (Step 1)
    # /jobs/[jobId] → Job Detail & Status View (conflicts with APIs like /jobs/123/save, handled above)
    # /jobs/[jobId]/review-and-set-criteria → Requirement Definition (Step 3)
    
    # All remaining requests go to Next.js frontend
    location / {
        limit_req zone=web_limit burst=100 nodelay;
        
        proxy_pass http://airecruiter_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}