# AI Recruiter Nginx Configuration - Simple HTTP Only
# Copy this file to /etc/nginx/sites-available/airecruiter

# Upstream configuration for backend API
upstream airecruiter_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Upstream configuration for frontend web
upstream airecruiter_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=60r/m;

# Main server block (HTTP only)
server {
    listen 80;
    server_name _;  # Accept all hostnames
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # API routes with /api/ prefix
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://airecruiter_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # ========== BACKEND API ENDPOINTS (NON-/api/ PREFIX) ==========
    
    # Core Job Management APIs
    location /jobs/parse {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api/api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    location /jobs/fetch {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api/api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    location /jobs/create {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api/api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    location /jobs/monitored {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api/api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    location /jobs/poll-now {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api/api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # Chat AI endpoint
    location /chat {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api/api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Job ID-specific endpoints (comprehensive coverage)
    location ~ ^/jobs/([0-9]+)/(monitored-data|save|draft|save-step|monitor|publish|sync)$ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api/api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Candidates API endpoints (all methods: search, analyze, message)
    location ~ ^/candidates/(search|analyze|message)$ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api/api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # Candidate ID-specific endpoints (resume, engage, assess)
    location ~ ^/candidates/([^/]+)/(resume|engage|assess)$ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://airecruiter_api/api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # ========== FRONTEND ROUTES (Next.js) ==========
    # Explicit frontend routes that should NOT go to API
    location = /settings {
        limit_req zone=web_limit burst=20 nodelay;
        proxy_pass http://airecruiter_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    location = /candidates {
        limit_req zone=web_limit burst=20 nodelay;
        proxy_pass http://airecruiter_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # Frontend Dashboard & UI routes that should go to Next.js:
    # / → Main Dashboard 
    # /jobs → Monitored Jobs Dashboard (conflicts with API /jobs/monitored, but different paths)
    # /jobs/new → Job Creation Wizard (Step 1)
    # /jobs/[jobId] → Job Detail & Status View (conflicts with APIs like /jobs/123/save, handled above)
    # /jobs/[jobId]/review-and-set-criteria → Requirement Definition (Step 3)
    
    # All remaining requests go to Next.js frontend
    location / {
        limit_req zone=web_limit burst=20 nodelay;
        
        proxy_pass http://airecruiter_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}